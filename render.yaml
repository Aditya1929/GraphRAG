services:
  - type: web
    name: graphreason-api
    env: python
    region: oregon
    plan: starter          # $7/month — upgrade for heavier workloads
    buildCommand: pip install -r app/backend/requirements.txt
    startCommand: uvicorn app.backend.api:app --host 0.0.0.0 --port $PORT
    rootDir: .
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_FRONTEND_API
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
